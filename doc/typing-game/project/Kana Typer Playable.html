<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>KANA TYPER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { font-family: "Press Start 2P", monospace; }
    #app { width: 100vw; height: 100dvh; height: 100vh; }
    @supports (height: 100dvh) {
      #app { height: 100dvh; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Plain JS modules -->
  <script src="app/romaji.js"></script>
  <script src="app/packs.js"></script>
  <script src="app/state.js"></script>

  <!-- JSX modules -->
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/game.jsx"></script>
  <script type="text/babel" src="app/screens-home.jsx"></script>
  <script type="text/babel" src="app/screens-other.jsx"></script>

  <script type="text/babel">
    function App() {
      const [state, setState] = React.useState(() => ({ ...getDefaults(), ...(loadState() || {}) }));
      const [screen, setScreen] = React.useState(state.onboarded ? 'home' : 'onboarding');
      const [lastResult, setLastResult] = React.useState(null);

      const theme = APP_THEMES[state.theme] || APP_THEMES.arcade;

      // Persist state changes
      React.useEffect(() => { saveState(state); }, [state]);

      function update(patch) { setState(s => ({ ...s, ...patch })); }

      function startGame() {
        setScreen('game');
      }

      function endGame(result) {
        const score = computeScore(result);
        const date = new Date().toISOString().slice(0, 16).replace('T', ' ');
        const entry = { ...result, score, date };
        setLastResult(entry);
        setState(s => ({
          ...s,
          history: [entry, ...(s.history || [])].slice(0, 50),
          bestScore: Math.max(s.bestScore || 0, score),
          bestWpm: Math.max(s.bestWpm || 0, result.wpm),
        }));
        setScreen('results');
      }

      // Render current screen
      let view;
      if (screen === 'onboarding') {
        view = <Onboarding theme={theme} onDone={(name) => {
          update({ name, onboarded: true });
          setScreen('home');
        }} />;
      } else if (screen === 'home') {
        view = <HomeView theme={theme} state={state} onStart={startGame} onScreen={setScreen} />;
      } else if (screen === 'game') {
        view = <GameScreen theme={theme} settings={state} onEnd={endGame} onExit={() => setScreen('home')} />;
      } else if (screen === 'results') {
        view = <Results theme={theme} result={lastResult || { wpm: 0, acc: 0, combo: 0, words: 0 }} state={state}
          onRestart={() => setScreen('game')} onHome={() => setScreen('home')} />;
      } else if (screen === 'leaderboard') {
        view = <Leaderboard theme={theme} state={state} onBack={() => setScreen('home')} />;
      } else if (screen === 'wordpacks') {
        view = <WordPacks theme={theme} state={state} onUpdate={update} onBack={() => setScreen('home')} />;
      } else if (screen === 'settings') {
        view = <Settings theme={theme} state={state} onUpdate={update} onBack={() => setScreen('home')} />;
      }

      return <div data-screen-label={screen} style={{ width: '100%', height: '100%' }}>{view}</div>;
    }

    // Wait until all babel scripts have loaded their components onto window.
    function tryMount() {
      if (window.GameScreen && window.HomeView && window.Onboarding && window.Settings && window.WordPacks && window.Leaderboard && window.Results) {
        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
      } else {
        setTimeout(tryMount, 30);
      }
    }
    tryMount();
  </script>
</body>
</html>
